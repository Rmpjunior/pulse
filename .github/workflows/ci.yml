name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Check README operational anchors
        run: npm run check:readme-anchors

      - name: Unit + smoke tests
        run: npm run test

      - name: Build
        run: npm run build

  p6-route-ui-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: quality-gates

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Start app
        run: npm run start > p6-route-ui-smoke.log 2>&1 &

      - name: Healthcheck app startup (with diagnostics)
        run: |
          set -e
          if ! npx -y wait-on --timeout 90000 http://127.0.0.1:3000/pt-BR; then
            echo "Startup healthcheck failed: app did not respond at /pt-BR within 90s"
            echo "--- Last 120 lines of p6-route-ui-smoke.log ---"
            tail -n 120 p6-route-ui-smoke.log || true
            echo "--- Probe / and /pt-BR (best effort) ---"
            curl -I http://127.0.0.1:3000/ || true
            curl -I http://127.0.0.1:3000/pt-BR || true
            exit 1
          fi

      - name: Run P6 route matrix smoke
        id: p6_route_smoke
        continue-on-error: true
        run: npm run qa:p6-route-matrix | tee p6-route-matrix.log

      - name: Capture screenshots on P6 smoke failure
        if: steps.p6_route_smoke.outcome == 'failure'
        run: |
          mkdir -p p6-failure-screenshots
          npx -y playwright@1.55.1 screenshot --device="Desktop Chrome" http://127.0.0.1:3000/pt-BR p6-failure-screenshots/desktop-landing.png
          npx -y playwright@1.55.1 screenshot --device="Desktop Chrome" http://127.0.0.1:3000/pt-BR/login p6-failure-screenshots/desktop-login.png
          npx -y playwright@1.55.1 screenshot --device="iPhone 14" http://127.0.0.1:3000/pt-BR p6-failure-screenshots/mobile-landing.png
          npx -y playwright@1.55.1 screenshot --device="iPhone 14" http://127.0.0.1:3000/pt-BR/login p6-failure-screenshots/mobile-login.png

      - name: Enforce P6 smoke result
        if: steps.p6_route_smoke.outcome == 'failure'
        run: |
          echo "P6 route matrix smoke failed. See logs/screenshots artifacts."
          exit 1

      - name: Upload P6 smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p6-route-ui-smoke-logs
          path: |
            p6-route-ui-smoke.log
            p6-route-matrix.log
            p6-failure-screenshots
